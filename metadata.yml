Title: CidalsDB anti-Leishmania and anti-SARS-CoV/SARS-CoV-2 activity model
Description: Multi-endpoint activity prediction model for Leishmania and 
  coronaviruses. RF, MLP, and ChemBERTa models are included for anti-Leishmania 
  prediction. GCN, GB, and ChemBERTa models are included for anti-coronavirus 
  prediction. The endpoints operate on molecular feature representations, 
  including fixed-length molecular vector encodings, graph-based 
  representations, and transformer-based sequence representations. Each endpoint
  returns an active probability.
