Status: In progress
Title: CidalsDB anti-Leishmania and anti-SARS-CoV/SARS-CoV-2 activity model
Description: 'Multi-endpoint activity prediction model for Leishmania and coronaviruses.
  It includes 6 endpoints: RF, MLP, and ChemBERTa for anti-Leishmania prediction,
  and GCN, GB, and ChemBERTa for anti-coronavirus prediction. The endpoints operate
  on molecular feature representations, including fixed-length molecular vector encodings,
  graph-based representations, and transformer-based sequence representations. Each
  endpoint returns Active/Inactive together with a confidence score.'
